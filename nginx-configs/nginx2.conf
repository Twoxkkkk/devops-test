events {}
http {
    map $remote_addr $xff_chain {
        "172.18.0.1"    $remote_addr;
        ~^172\.18\.     $proxy_add_x_forwarded_for;
        default         $remote_addr;
    }

    server {
        listen 80;
        location / {
            proxy_set_header X-Forwarded-For $xff_chain;
            proxy_set_header Host $host;
            proxy_pass http://nginx_3:80;
        }
    }
}